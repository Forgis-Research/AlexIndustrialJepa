#
# Root pyproject.toml for the IndustrialJEPA monorepo.
#
# This file only holds shared tooling configuration (ruff, black, isort).
# It does NOT define a buildable package — each subproject under
# mechanical-jepa/, paper-replications/*/, and mechanical-datasets/ manages
# its own Python environment via its own requirements.txt.

[tool.ruff]
line-length = 120
target-version = "py310"
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.black]
line-length = 120
target-version = ["py310"]

[tool.isort]
profile = "black"
line_length = 120
